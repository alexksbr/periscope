name: periscope

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: periscope
      CLICKHOUSE_USER: periscope
      CLICKHOUSE_PASSWORD: periscope
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./src/periscope/schemas/clickhouse:/docker-entrypoint-initdb.d:ro
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user=$$CLICKHOUSE_USER --password=$$CLICKHOUSE_PASSWORD --query='SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      clickhouse:
        condition: service_healthy
    user: "0:0"
    volumes:
      - ./docker/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
      - otel-collector-data:/var/lib/otelcol
    ports:
      - "4317:4317"
      - "4318:4318"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: periscope
      POSTGRES_USER: periscope
      POSTGRES_PASSWORD: periscope
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U periscope -d periscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clickhouse-data:
  otel-collector-data:
  postgres-data:
  redis-data:
